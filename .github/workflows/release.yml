name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > src/host/version.txt
          echo "Set version to $VERSION"

      - name: Fetch Move Manual
        run: |
          ./scripts/fetch_move_manual.sh || echo "Warning: manual fetch failed, continuing without bundled manual"

      - name: Build schwung-manager (Go)
        run: |
          # Built BEFORE Docker: package.sh runs inside the container and
          # picks the binary up from build/ — no tarball injection.
          mkdir -p build
          cd schwung-manager
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o ../build/schwung-manager -ldflags="-s -w" .
          echo "Built: schwung-manager ($(wc -c < ../build/schwung-manager | tr -d ' ') bytes)"

      - name: Build with Docker
        run: |
          docker build -t schwung-builder .
          docker run --rm -v "$PWD:/build" schwung-builder

      - name: Verify build
        run: |
          ls -la schwung.tar.gz
          echo "=== Checking for schwung-manager ==="
          tar -tzf schwung.tar.gz | grep schwung-manager || echo "WARNING: schwung-manager not in tarball!"
          tar -tzvf schwung.tar.gz | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: schwung.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: release.json is intentionally NOT auto-committed here. main is
      # branch-protected (required status checks), so a github-actions[bot]
      # `git push origin main` is rejected (GH006) and fails the whole workflow
      # even though the release + asset above succeeded. Instead, the release PR
      # that bumps module-catalog.json `host.latest_version` (which is what
      # schwung-manager actually reads to offer the update) also updates
      # release.json to the same version. See the release checklist in CLAUDE.md.
