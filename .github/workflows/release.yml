name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > src/host/version.txt
          echo "Set version to $VERSION"

      - name: Fetch Move Manual
        run: |
          ./scripts/fetch_move_manual.sh || echo "Warning: manual fetch failed, continuing without bundled manual"

      - name: Build with Docker
        run: |
          docker build -t schwung-builder .
          docker run --rm -v "$PWD:/build" schwung-builder

      - name: Build schwung-manager (Go)
        run: |
          cd schwung-manager
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o /tmp/schwung-manager -ldflags="-s -w" .
          echo "Built: schwung-manager ($(wc -c < /tmp/schwung-manager | tr -d ' ') bytes)"
          cd ..
          # Inject into tarball (build/ is root-owned from Docker, so use /tmp)
          gunzip -f schwung.tar.gz
          cp /tmp/schwung-manager ./schwung-manager-bin
          tar --transform 's,^schwung-manager-bin,schwung/schwung-manager,' -rf schwung.tar schwung-manager-bin
          gzip -f schwung.tar
          rm schwung-manager-bin

      - name: Verify build
        run: |
          ls -la schwung.tar.gz
          echo "=== Checking for schwung-manager ==="
          tar -tzf schwung.tar.gz | grep schwung-manager || echo "WARNING: schwung-manager not in tarball!"
          tar -tzvf schwung.tar.gz | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: schwung.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git fetch origin main
          git checkout -f main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Recreate release.json on main branch
          cat > release.json << EOF
          {
            "version": "${VERSION}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/schwung.tar.gz"
          }
          EOF
          git add release.json
          if git diff --cached --quiet; then
            echo "release.json already up to date"
          else
            git commit -m "chore: update release.json for ${{ github.ref_name }}"
            git push origin main
          fi
