{{template "base" .}}

{{define "title"}}Remote UI - Schwung Manager{{end}}

{{define "content"}}
<div class="page-header remote-ui-header">
    <h1>Remote UI</h1>
    <p>Control shadow slot parameters in real time.</p>
</div>

<div class="remote-ui-tabs" role="tablist" aria-label="Shadow slots">
    <button class="remote-ui-tab active" role="tab" aria-selected="true" data-slot="0" onclick="switchSlot(0)">Slot 1</button>
    <button class="remote-ui-tab" role="tab" aria-selected="false" data-slot="1" onclick="switchSlot(1)">Slot 2</button>
    <button class="remote-ui-tab" role="tab" aria-selected="false" data-slot="2" onclick="switchSlot(2)">Slot 3</button>
    <button class="remote-ui-tab" role="tab" aria-selected="false" data-slot="3" onclick="switchSlot(3)">Slot 4</button>
    <button class="remote-ui-tab" role="tab" aria-selected="false" data-slot="master" onclick="switchSlot('master')">Master FX</button>
</div>

<div id="remote-ui-slot" class="remote-ui-slot" role="tabpanel">
    <div id="slot-header" class="slot-header">
        <h2 id="slot-title">Slot 1</h2>
    </div>

    <div id="slot-content">
        <!-- Component sections rendered by JS -->
    </div>

    <div id="slot-debug" class="slot-debug">
        <p class="text-muted">Waiting for data...</p>
    </div>
</div>

<link rel="stylesheet" href="/static/remote-ui.css">
<script src="/static/remote-ui.js"></script>
{{end}}
